name: Daily Stock Collection

on:
  schedule:
    - cron: '30 7 * * 1-5' # 한국시간 평일 오후 4:30 실행 (UTC 07:30)
  workflow_dispatch:      # 수동 실행 버튼 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24 환경 강제 사용

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 저장소에 파일을 쓸 수 있는 명시적 권한 부여
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 토큰을 통한 권한 인증

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install finance-datareader pandas

      - name: Run script
        run: python collect_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # data 폴더가 생성되었는지 확인 후 스테이징
          git add data/*.json || echo "No data files found to add"
          
          # 변경사항이 있을 때만 커밋 및 푸시 진행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: Stock data $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes detected. Skipping push."
          fi
