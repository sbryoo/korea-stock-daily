name: Daily Stock Collection

on:
  schedule:
    - cron: '30 7 * * 1-5' # 한국시간 평일 오후 4:30 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24 강제 사용 설정 (경고 해결)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 저장소 쓰기 권한 부여
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install finance-datareader pandas

      - name: Run script
        run: python collect_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          
          # 변경사항이 있는 경우에만 커밋 및 푸시 (exit code 128 방지)
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update stock data $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes to commit"
          fi
