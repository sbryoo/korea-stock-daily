name: Daily Stock Collection

on:
  schedule:
    - cron: '30 7 * * 1-5' # 한국시간 평일 오후 4:30 실행
  workflow_dispatch:      # 테스트를 위해 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install finance-datareader pandas

      - name: Run script
        run: python collect_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update stock data $(date +'%Y-%m-%d')" || exit 0
          git push
