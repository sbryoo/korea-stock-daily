name: Daily Stock Collection

on:
  schedule:
    - cron: '30 7 * * 1-5' # 한국시간 평일 오후 4:30
  workflow_dispatch:      # 수동 실행 버튼

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # Node 버전 경고 억제

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 이 작업에 쓰기 권한을 명시적으로 부여
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 토큰 주입 (권한 문제 해결)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install finance-datareader pandas

      - name: Run script
        run: python collect_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 데이터 폴더가 있는지 확인하고 추가
          git add data/*.json || echo "No data files found"
          
          # 변경사항이 있을 때만 푸시
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update stock data $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
